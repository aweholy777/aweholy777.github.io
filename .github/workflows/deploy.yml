# .github/workflows/deploy.yml
#
# ✅ 已改用 Cloudflare Pages 自動部署
# Cloudflare Pages 會直接監聽 GitHub push 事件，自動 build 並部署。
# 此 workflow 已停用 GitHub Pages 部署，改為只做 Hugo build 驗證（確保每次 push 不會壞掉）。
#
# Cloudflare Pages 設定：
#   Build command:       hugo --minify --buildFuture
#   Build output:        public
#   Environment var:     HUGO_VERSION=0.111.3

name: Hugo Build Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# 最小權限
permissions:
  contents: read

concurrency:
  group: "build-check-${{ github.ref }}"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Verify Hugo Build
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.111.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '${{ env.HUGO_VERSION }}'

      - name: Build with Hugo (驗證用，不部署)
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --minify --buildFuture --baseURL "https://cmtc.tw/"
          echo "✅ Hugo build 成功！Cloudflare Pages 將自動完成部署。"
