<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>聖經已讀統計｜可勾選與自動記錄</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --bg-soft: #172033;
      --panel: rgba(17, 24, 39, .74);
      --panel-solid: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #60a5fa;
      --border: rgba(148, 163, 184, .22);
      --chip: rgba(2, 6, 23, .62);
      --shadow: rgba(2, 6, 23, .35);
      --link: #93c5fd;
    }

    body[data-theme="warm"] {
      color-scheme: light;
      --bg: #fff4df;
      --bg-soft: #ffe3b3;
      --panel: rgba(255, 251, 235, .84);
      --panel-solid: #fff7ed;
      --text: #3f2414;
      --muted: #815f44;
      --accent: #c2410c;
      --accent-2: #d97706;
      --border: rgba(146, 64, 14, .22);
      --chip: rgba(255, 247, 237, .82);
      --shadow: rgba(120, 53, 15, .13);
      --link: #9a3412;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(900px 520px at 8% -10%, var(--bg-soft), transparent 58%),
        radial-gradient(760px 460px at 112% 0%, rgba(96, 165, 250, .18), transparent 54%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    body[data-theme="warm"] {
      background:
        radial-gradient(900px 520px at 8% -10%, #ffdca3, transparent 58%),
        radial-gradient(760px 460px at 112% 0%, #f9b66d, transparent 56%),
        var(--bg);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: saturate(150%) blur(14px);
      padding: 16px 12px 12px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 14px 56px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 800;
    }

    a { color: var(--link); }

    .sub {
      max-width: 820px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar, .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    button, .chip, label.btn, .theme-switch {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      border-radius: 10px;
      font-size: 14px;
    }

    button, label.btn {
      min-height: 38px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover, label.btn:hover {
      border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
    }

    button:focus-visible, input:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent-2) 42%, transparent);
      outline-offset: 2px;
    }

    .chip {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      user-select: none;
    }

    .chip b { font-weight: 800; }

    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
    }

    .theme-switch button {
      min-height: 30px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      padding: 5px 10px;
    }

    .theme-switch button[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    progress {
      width: min(250px, 100%);
      height: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--chip);
      vertical-align: middle;
    }

    progress::-webkit-progress-bar { background: var(--chip); }
    progress::-webkit-progress-value { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    progress::-moz-progress-bar { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

    input[type="search"], input[type="file"] {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--chip);
      color: var(--text);
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }

    input[type="search"] {
      width: min(420px, 100%);
    }

    .note, .foot {
      color: var(--muted);
      font-size: 12px;
    }

    .books {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    details.book {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 12px 34px var(--shadow);
    }

    details > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    details > summary::-webkit-details-marker { display: none; }
    details[open] > summary { border-bottom: 1px solid var(--border); }

    .title {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 9px;
      min-width: 0;
    }

    .title h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .title .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .summary-actions {
      display: flex;
      flex: 0 0 auto;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .summary-actions button {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .chapters { padding: 12px 12px 16px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
      gap: 8px;
    }

    .cell {
      display: flex;
      min-height: 40px;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: color-mix(in srgb, var(--panel-solid) 74%, transparent);
      padding: 7px 8px;
      font-size: 14px;
      font-weight: 650;
    }

    .cell input[type="checkbox"] {
      flex: 0 0 auto;
      width: 19px;
      height: 19px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .cell > span {
      min-width: 1.6em;
      text-align: left;
    }

    .cell.read {
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      background: color-mix(in srgb, var(--accent) 16%, var(--panel-solid));
    }

    .empty {
      grid-column: 1 / -1;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
    }

    .hidden { display: none !important; }
    .foot { margin-top: 30px; text-align: center; }

    @media (max-width: 560px) {
      header { position: static; }
      .container { padding-inline: 12px; }
      .books { grid-template-columns: 1fr; }
      .toolbar > *, .filters > * { width: 100%; }
      .theme-switch, .chip { width: auto; }
      details > summary { align-items: flex-start; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>聖經已讀統計</h1>
      <div class="sub">
        參考 <a href="https://cmtc.tw/daily-qt/bibletracker.html" target="_blank" rel="noopener">CMTC 讀經追蹤</a>，可勾選章節、統計進度、匯出/匯入，並自動儲存在本機裝置。
      </div>
      <div class="toolbar">
        <span class="chip">全書章數：<b id="totalChapters">-</b>　已讀：<b id="readCount">0</b>　(<b id="percent">0</b>%)</span>
        <progress id="progress" value="0" max="1189" aria-label="總進度"></progress>
        <span class="theme-switch" aria-label="背景主題">
          <button id="themeDark" type="button" aria-pressed="true">深色</button>
          <button id="themeWarm" type="button" aria-pressed="false">暖色</button>
        </span>
        <button id="toggleUnread" type="button" aria-pressed="false">只顯示未讀</button>
        <button id="expandAll" type="button">展開全部</button>
        <button id="collapseAll" type="button">收合全部</button>
        <button id="resetAll" type="button">全部清除</button>
        <button id="exportBtn" type="button">匯出進度</button>
        <label class="btn">
          匯入進度
          <input id="importInput" type="file" accept="application/json" class="hidden" />
        </label>
      </div>
      <div class="filters">
        <input id="search" type="search" placeholder="搜尋書卷或章節，例如：創、創世記 1、John 3" autocomplete="off" />
        <span class="note">資料只會存在這台裝置的瀏覽器，不會上傳。</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="books" class="books" aria-live="polite"></section>
    <div class="foot">v1.1 · 可離線使用</div>
  </main>

<script>
const STORAGE_KEY = "bibleProgress";
const THEME_KEY = "bibleTrackerTheme";

const bibleData = [
  ["創世記", 50], ["出埃及記", 40], ["利未記", 27], ["民數記", 36], ["申命記", 34],
  ["約書亞記", 24], ["士師記", 21], ["路得記", 4], ["撒母耳記上", 31], ["撒母耳記下", 24],
  ["列王紀上", 22], ["列王紀下", 25], ["歷代志上", 29], ["歷代志下", 36], ["以斯拉記", 10],
  ["尼希米記", 13], ["以斯帖記", 10], ["約伯記", 42], ["詩篇", 150], ["箴言", 31],
  ["傳道書", 12], ["雅歌", 8], ["以賽亞書", 66], ["耶利米書", 52], ["耶利米哀歌", 5],
  ["以西結書", 48], ["但以理書", 12], ["何西阿書", 14], ["約珥書", 3], ["阿摩司書", 9],
  ["俄巴底亞書", 1], ["約拿書", 4], ["彌迦書", 7], ["那鴻書", 3], ["哈巴谷書", 3],
  ["西番雅書", 3], ["哈該書", 2], ["撒迦利亞書", 14], ["瑪拉基書", 4],
  ["馬太福音", 28], ["馬可福音", 16], ["路加福音", 24], ["約翰福音", 21], ["使徒行傳", 28],
  ["羅馬書", 16], ["哥林多前書", 16], ["哥林多後書", 13], ["加拉太書", 6], ["以弗所書", 6],
  ["腓立比書", 4], ["歌羅西書", 4], ["帖撒羅尼迦前書", 5], ["帖撒羅尼迦後書", 3],
  ["提摩太前書", 6], ["提摩太後書", 4], ["提多書", 3], ["腓利門書", 1], ["希伯來書", 13],
  ["雅各書", 5], ["彼得前書", 5], ["彼得後書", 3], ["約翰一書", 5], ["約翰二書", 1],
  ["約翰三書", 1], ["猶大書", 1], ["啟示錄", 22]
];

const aliases = new Map([
  ["genesis", "創世記"], ["exo", "出埃及記"], ["exodus", "出埃及記"], ["john", "約翰福音"],
  ["romans", "羅馬書"], ["psalm", "詩篇"], ["psalms", "詩篇"], ["proverbs", "箴言"],
  ["matthew", "馬太福音"], ["mark", "馬可福音"], ["luke", "路加福音"], ["acts", "使徒行傳"],
  ["revelation", "啟示錄"]
]);

const totalChapters = bibleData.reduce((sum, [, chapters]) => sum + chapters, 0);
const elements = {
  books: document.getElementById("books"),
  totalChapters: document.getElementById("totalChapters"),
  readCount: document.getElementById("readCount"),
  percent: document.getElementById("percent"),
  progress: document.getElementById("progress"),
  search: document.getElementById("search"),
  toggleUnread: document.getElementById("toggleUnread"),
  themeDark: document.getElementById("themeDark"),
  themeWarm: document.getElementById("themeWarm")
};

const state = {
  progress: loadProgress(),
  showUnreadOnly: false,
  query: "",
  openBooks: new Set()
};

elements.totalChapters.textContent = totalChapters;
elements.progress.max = totalChapters;

function loadProgress() {
  try {
    const value = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    return normalizeProgress(value && typeof value === "object" ? value : {});
  } catch {
    return {};
  }
}

function normalizeProgress(data) {
  const normalized = {};
  for (const [book, chapters] of Object.entries(data)) {
    if (!chapters || typeof chapters !== "object" || Array.isArray(chapters)) continue;
    normalized[book] = {};
    for (const [chapter, value] of Object.entries(chapters)) {
      if (value) normalized[book][chapter] = true;
    }
    if (Object.keys(normalized[book]).length === 0) delete normalized[book];
  }
  return normalized;
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
  updateProgress();
}

function normalize(value) {
  return String(value).trim().toLowerCase();
}

function parseSearch(query) {
  const normalized = normalize(query);
  if (!normalized) return { book: "", chapter: null };

  const match = normalized.match(/^(.+?)\s*(\d+)$/);
  if (!match) return { book: aliases.get(normalized) || normalized, chapter: null };

  const rawBook = normalize(match[1]);
  return {
    book: aliases.get(rawBook) || rawBook,
    chapter: Number(match[2])
  };
}

function getBookProgress(name) {
  return state.progress[name] || {};
}

function isRead(name, chapter) {
  return Boolean(getBookProgress(name)[chapter]);
}

function setRead(name, chapter, checked) {
  if (!state.progress[name]) state.progress[name] = {};
  if (checked) {
    state.progress[name][chapter] = true;
  } else {
    delete state.progress[name][chapter];
    if (Object.keys(state.progress[name]).length === 0) delete state.progress[name];
  }
}

function updateProgress() {
  const readCount = Object.values(state.progress).reduce((sum, chapters) => {
    return sum + Object.values(chapters).filter(Boolean).length;
  }, 0);
  elements.readCount.textContent = readCount;
  elements.percent.textContent = ((readCount / totalChapters) * 100).toFixed(1);
  elements.progress.value = readCount;
}

function createBook(name, chapters) {
  const readChapters = getBookProgress(name);
  const readCount = Object.keys(readChapters).length;
  const details = document.createElement("details");
  details.className = "book";
  details.dataset.book = name;
  details.open = state.openBooks.has(name);

  details.addEventListener("toggle", () => {
    if (details.open) state.openBooks.add(name);
    else state.openBooks.delete(name);
  });

  const summary = document.createElement("summary");
  const title = document.createElement("div");
  title.className = "title";

  const heading = document.createElement("h3");
  heading.textContent = name;

  const meta = document.createElement("span");
  meta.className = "meta";
  meta.textContent = `共 ${chapters} 章 · 已讀 ${readCount}`;

  title.append(heading, meta);

  const actions = document.createElement("div");
  actions.className = "summary-actions";

  const markAll = document.createElement("button");
  markAll.type = "button";
  markAll.textContent = "全選";
  markAll.addEventListener("click", (event) => {
    event.preventDefault();
    event.stopPropagation();
    for (let i = 1; i <= chapters; i++) setRead(name, i, true);
    state.openBooks.add(name);
    saveProgress();
    render();
  });

  const clearAll = document.createElement("button");
  clearAll.type = "button";
  clearAll.textContent = "清除";
  clearAll.addEventListener("click", (event) => {
    event.preventDefault();
    event.stopPropagation();
    for (let i = 1; i <= chapters; i++) setRead(name, i, false);
    state.openBooks.add(name);
    saveProgress();
    render();
  });

  actions.append(markAll, clearAll);
  summary.append(title, actions);

  const chapterWrap = document.createElement("div");
  chapterWrap.className = "chapters";

  const grid = document.createElement("div");
  grid.className = "grid";

  for (let chapter = 1; chapter <= chapters; chapter++) {
    const checked = isRead(name, chapter);
    if (state.showUnreadOnly && checked) continue;

    const cell = document.createElement("label");
    cell.className = checked ? "cell read" : "cell";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = checked;
    checkbox.addEventListener("change", () => {
      setRead(name, chapter, checkbox.checked);
      state.openBooks.add(name);
      saveProgress();
      render();
    });

    const number = document.createElement("span");
    number.textContent = chapter;

    cell.append(checkbox, number);
    grid.appendChild(cell);
  }

  if (!grid.children.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "這卷書沒有未讀章節";
    grid.appendChild(empty);
  }

  chapterWrap.appendChild(grid);
  details.append(summary, chapterWrap);
  return details;
}

function bookMatches(name, chapters, search) {
  if (!search.book) return true;
  const bookName = normalize(name);
  if (bookName.includes(search.book)) return true;
  if (search.chapter && bookName.includes(search.book) && search.chapter <= chapters) return true;
  return false;
}

function render() {
  const search = parseSearch(state.query);
  elements.books.innerHTML = "";
  let visibleBooks = 0;

  for (const [name, chapters] of bibleData) {
    if (!bookMatches(name, chapters, search)) continue;

    const book = createBook(name, chapters);
    if (state.showUnreadOnly || search.chapter) {
      book.open = true;
      state.openBooks.add(name);
    }

    if (search.chapter) {
      book.querySelectorAll(".cell").forEach((cell) => {
        const chapter = Number(cell.querySelector("span").textContent);
        cell.classList.toggle("hidden", chapter !== search.chapter);
      });
    }

    elements.books.appendChild(book);
    visibleBooks++;
  }

  if (!visibleBooks) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "找不到符合的書卷";
    elements.books.appendChild(empty);
  }

  updateProgress();
}

function setTheme(theme) {
  const activeTheme = theme === "warm" ? "warm" : "dark";
  document.body.dataset.theme = activeTheme;
  localStorage.setItem(THEME_KEY, activeTheme);
  elements.themeDark.setAttribute("aria-pressed", String(activeTheme === "dark"));
  elements.themeWarm.setAttribute("aria-pressed", String(activeTheme === "warm"));
}

elements.toggleUnread.addEventListener("click", () => {
  state.showUnreadOnly = !state.showUnreadOnly;
  elements.toggleUnread.textContent = state.showUnreadOnly ? "顯示全部" : "只顯示未讀";
  elements.toggleUnread.setAttribute("aria-pressed", String(state.showUnreadOnly));
  render();
});

document.getElementById("expandAll").addEventListener("click", () => {
  bibleData.forEach(([name]) => state.openBooks.add(name));
  render();
});

document.getElementById("collapseAll").addEventListener("click", () => {
  state.openBooks.clear();
  render();
});

document.getElementById("resetAll").addEventListener("click", () => {
  if (!confirm("確定要清除全部紀錄嗎？")) return;
  localStorage.removeItem(STORAGE_KEY);
  state.progress = {};
  render();
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state.progress, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "bible-progress.json";
  link.click();
  URL.revokeObjectURL(url);
});

document.getElementById("importInput").addEventListener("change", (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.addEventListener("load", () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || typeof data !== "object" || Array.isArray(data)) throw new Error("Invalid data");
      state.progress = normalizeProgress(data);
      saveProgress();
      render();
    } catch {
      alert("匯入失敗：檔案格式錯誤");
    } finally {
      event.target.value = "";
    }
  });
  reader.readAsText(file);
});

elements.search.addEventListener("input", (event) => {
  state.query = event.target.value;
  render();
});

elements.themeDark.addEventListener("click", () => setTheme("dark"));
elements.themeWarm.addEventListener("click", () => setTheme("warm"));

setTheme(localStorage.getItem(THEME_KEY) || "dark");
render();
</script>
</body>
</html>
